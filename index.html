<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>deepchilled_coffee</title>
    <h2 style = "text-align: center; padding: 20px;">deepchilled_coffee</h2>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Constant navbar-->
    <header>
        <nav id="navbar">
            <div class="nav-item">
                <a href="#" data-category="fiction">Fiction</a>
                <a href="#" data-category="non-fiction">Nonfiction</a>
                <a href="#" data-category="poetry">Poetry</a>
                <a href="#" data-category="feature">Features</a>
            </div>
        </nav>
    </header>
    <!--Main content-->

    <main id="content">
        <!--Layout A: Post Selector-->
        <section id="post-selector">
            <div id="hero-container">
                    <h4 id="hero-title"></h4>
                    <p id="hero-subtitle"></p>
                    <button class="read-more-button">Read more</button>
            </div>

            <div id="grid-container" class="grid">
                <div class="grid-item">
                    <div id="post-image"></div>
                    <h4 id="post-title"></h4>
                    <p id="post-subtitle"></p>
                    <button class="read-more-button">Read more</button>
                </div>
            </div>
        </section>

        <!--Layout B: Post Reader-->
        <section id="post-reader" class="hidden">
            <div id="reader-container">
                <div id="reader-title"></div>
                <div id="reader-subtitle"></div>
                <div id="reader-image"></div>
                <div id="reader-content"></div>
                <button id="back-button">Back</button>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
